<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Datos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dive">
        <h1>Captura de datos personales</h1>
        <br>
        <h2>Ingresa los datos que se te piden</h2>
        <br>
        <p>Mi primera encuesta</p>
        <hr>

        <form>
            <label>Nombre:</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre"><br><br>

            <label>Edad:</label>
            <input type="number" id="edad" placeholder="Tu edad"><br><br>

            <label>Ciudad donde vives:</label>
            <input type="text" id="ciudad" placeholder="Ciudad"><br><br>

            <label>Pasatiempo favorito:</label>
            <input type="text" id="pasatiempo" placeholder="Ej. leer, correr"><br><br>

            <a href="resultados.html">
                <button type="button">Registrar los datos ingresados</button>
            </a>
        </form>
    </div>
    <script>
    document.querySelector("button").addEventListener("click", function() {
        let nombre = document.getElementById("nombre").value;
        let edad = document.getElementById("edad").value;
        let ciudad = document.getElementById("ciudad").value;
        let pasatiempo = document.getElementById("pasatiempo").value;

        localStorage.setItem("nombre", nombre);
        localStorage.setItem("edad", edad);
        localStorage.setItem("ciudad", ciudad);
        localStorage.setItem("pasatiempo", pasatiempo);
    });
</script>
</body>
</html>
